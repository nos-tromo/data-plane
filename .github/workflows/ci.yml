name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Pinned to v1 (latest stable v1.x.y).
    uses: nos-tromo/.github/.github/workflows/infra-validation.yml@v1
    with:
      compose-files: '-f docker/compose.yaml -f docker/compose.override.yaml'
      compose-profiles: '--profile cpu --profile cuda'
      dockerfiles-glob: 'docker/Dockerfile.*'
      shell-scripts-glob: 'scripts/*.sh'
