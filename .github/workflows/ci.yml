name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    # Pinned to nos-tromo/.github@1dc9e8b until v1 is tagged.
    uses: nos-tromo/.github/.github/workflows/infra-validation.yml@e35684ee26020e87305bd357b0a27073479177cf
    with:
      compose-files: '-f docker/compose.yaml -f docker/compose.override.yaml'
      compose-profiles: '--profile cpu --profile cuda'
      dockerfiles-glob: 'docker/Dockerfile.*'
      shell-scripts-glob: 'scripts/*.sh'
