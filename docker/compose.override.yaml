### Dev override — publishes service ports to the host.
###
### NOT auto-loaded: it lives in docker/ and operators always pass explicit
### -f flags via the Makefile. `make up` uses docker/compose.yaml only
### (production shape, no host ports); `make up-dev` layers this file on top.
###
### Why this matters: in airgap production the only exposure is via the
### data-net network. Accidentally publishing 7474/7687/6333/6334 on the
### host would breach that boundary.

services:
  neo4j:
    ports:
      - "${NEO4J_BOLT_HOST_PORT:-7687}:7687"
      - "${NEO4J_HTTP_HOST_PORT:-7474}:7474"

  qdrant-cpu:
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"

  qdrant-cuda:
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6334}:6334"
